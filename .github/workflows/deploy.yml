name: Deploy to Droplet

on:
  workflow_run:
    workflows: ["Build and Push Images"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g., latest, dev-zet, or sha-<commit>)"
        required: true
        default: "latest"
      healthcheck_url:
        description: "Optional post-deploy URL check (use an API-backed endpoint, not /health)"
        required: false
        default: ""

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read
    env:
      IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || format('sha-{0}', github.event.workflow_run.head_sha) }}
      HEALTHCHECK_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.healthcheck_url || '' }}
      DEPLOY_BRANCH: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
      POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
      PGSSLMODE: ${{ secrets.PGSSLMODE }}
      INFLUXDB_INIT_MODE: ${{ secrets.INFLUXDB_INIT_MODE }}
      INFLUXDB_USERNAME: ${{ secrets.INFLUXDB_USERNAME }}
      INFLUXDB_PASSWORD: ${{ secrets.INFLUXDB_PASSWORD }}
      INFLUXDB_ORG: ${{ secrets.INFLUXDB_ORG }}
      INFLUXDB_BUCKET: ${{ secrets.INFLUXDB_BUCKET }}
      INFLUXDB_TOKEN: ${{ secrets.INFLUXDB_TOKEN }}
      INFLUXDB_URL: ${{ secrets.INFLUXDB_URL }}
      INFLUXDB_CLI_CONFIG_NAME: ${{ vars.INFLUXDB_CLI_CONFIG_NAME }}
      MQTT_BROKER_HOST: ${{ vars.MQTT_BROKER_HOST }}
      MQTT_BROKER_PORT: ${{ vars.MQTT_BROKER_PORT }}
      ETL_SYNC_INTERVAL: ${{ vars.ETL_SYNC_INTERVAL }}
      AGG_WINDOW_MINUTES: ${{ vars.AGG_WINDOW_MINUTES }}
      THRESHOLD_SMOKE_ORANGE: ${{ vars.THRESHOLD_SMOKE_ORANGE }}
      THRESHOLD_SMOKE_RED: ${{ vars.THRESHOLD_SMOKE_RED }}
      THRESHOLD_TEMP_ORANGE: ${{ vars.THRESHOLD_TEMP_ORANGE }}
      THRESHOLD_TEMP_RED: ${{ vars.THRESHOLD_TEMP_RED }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      REPO_ACCESS_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- NEW: Image Availability Check ---
      # This prevents the "too fast" error by checking GHCR before starting SSH
      - name: Verify Image Exists in GHCR
        run: |
          set -euo pipefail
          REPO_LOWER="${GITHUB_REPOSITORY,,}"
          TAG="${IMAGE_TAG}"
          echo "Checking required images for tag '${TAG}' in ghcr.io/${REPO_LOWER}/..."
          
          # We use docker manifest to check if the image is actually there
          echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

          for image in api etl; do
            if ! docker manifest inspect "ghcr.io/${REPO_LOWER}/${image}:${TAG}" > /dev/null 2>&1; then
              echo "Error: Image tag '${TAG}' not found for ${image} in GHCR. Wait for Build CI to finish."
              exit 1
            fi
          done

          echo "Image tags verified. Proceeding to deploy."

      - name: SSH host key preflight
        run: |
          set -euo pipefail
          HOST="${{ secrets.DO_SSH_HOST }}"
          PORT="${{ secrets.DO_SSH_PORT || '22' }}"
          # Use ssh-keyscan to update known_hosts so appleboy doesn't trip on the new IP fingerprint
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" "$HOST" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_SSH_HOST }}
          port: ${{ secrets.DO_SSH_PORT || '22' }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          # We automated this in Terraform! Ensure secrets.DO_SSH_FINGERPRINT is the HOST key fingerprint
          fingerprint: ${{ secrets.DO_SSH_FINGERPRINT }}
          script_stop: true
          envs: IMAGE_TAG,HEALTHCHECK_URL,DEPLOY_BRANCH,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,POSTGRES_HOST,POSTGRES_PORT,PGSSLMODE,INFLUXDB_INIT_MODE,INFLUXDB_USERNAME,INFLUXDB_PASSWORD,INFLUXDB_ORG,INFLUXDB_BUCKET,INFLUXDB_TOKEN,INFLUXDB_URL,INFLUXDB_CLI_CONFIG_NAME,MQTT_BROKER_HOST,MQTT_BROKER_PORT,ETL_SYNC_INTERVAL,AGG_WINDOW_MINUTES,THRESHOLD_SMOKE_ORANGE,THRESHOLD_SMOKE_RED,THRESHOLD_TEMP_ORANGE,THRESHOLD_TEMP_RED,GITHUB_REPOSITORY,GHCR_USERNAME,GHCR_TOKEN,REPO_ACCESS_TOKEN
          script: |
            set -euo pipefail
            APP_DIR="/opt/fire-monitoring"
            IMAGE_REGISTRY="ghcr.io/$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
            GHCR_USER="${GHCR_USERNAME:-${GITHUB_ACTOR:-}}"

            sudo mkdir -p "${APP_DIR}"
            sudo chown -R $USER:$USER "${APP_DIR}"

            if [ ! -d "${APP_DIR}/.git" ]; then
              git clone "https://x-access-token:${REPO_ACCESS_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "${APP_DIR}"
            fi

            cd "${APP_DIR}"
            git remote set-url origin "https://x-access-token:${REPO_ACCESS_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            
            # Use the branch that triggered the workflow (main or dev-zet)
            git fetch origin "${DEPLOY_BRANCH}"
            git checkout "${DEPLOY_BRANCH}"
            git reset --hard "origin/${DEPLOY_BRANCH}"

            # Create production env
            cat > .env.prod <<EOF
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            POSTGRES_DB=${POSTGRES_DB}
            DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB}
            PGSSLMODE=${PGSSLMODE}
            INFLUXDB_INIT_MODE=${INFLUXDB_INIT_MODE}
            INFLUXDB_USERNAME=${INFLUXDB_USERNAME}
            INFLUXDB_PASSWORD=${INFLUXDB_PASSWORD}
            INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
            INFLUXDB_ORG=${INFLUXDB_ORG}
            INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
            INFLUXDB_URL=${INFLUXDB_URL}
            IMAGE_REGISTRY=${IMAGE_REGISTRY}
            IMAGE_TAG=${IMAGE_TAG}
            EOF
            cp .env.prod .env

            if [ -z "${GHCR_USER}" ] || [ -z "${GHCR_TOKEN}" ]; then
              echo "Error: GHCR credentials are missing. Set GHCR_USERNAME and GHCR_TOKEN."
              exit 1
            fi

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
            
            # Pull and Restart
            docker compose -f docker-compose.yml -f docker-compose-prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose-prod.yml up -d --remove-orphans --force-recreate

            # Verify API health inside the api container with retries to handle slow startup.
            api_ok=0
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.yml -f docker-compose-prod.yml exec -T api \
                node -e "require('http').get('http://localhost:8000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"; then
                api_ok=1
                echo "Internal API healthcheck passed."
                break
              fi
              sleep 3
            done

            if [ "${api_ok}" -ne 1 ]; then
              echo "Error: API healthcheck failed inside api container."
              docker compose -f docker-compose.yml -f docker-compose-prod.yml ps
              docker compose -f docker-compose.yml -f docker-compose-prod.yml logs --tail=80 api nginx || true
              exit 1
            fi

            if [ -n "${HEALTHCHECK_URL:-}" ]; then
              if [ "${HEALTHCHECK_URL}" = "http://localhost/health" ] || [ "${HEALTHCHECK_URL}" = "https://localhost/health" ]; then
                echo "Error: HEALTHCHECK_URL points to nginx /health which is not app-level. Use an API-backed URL or leave it empty."
                exit 1
              fi

              echo "Running healthcheck against ${HEALTHCHECK_URL}"
              for i in $(seq 1 30); do
                if curl -fsS --max-time 5 "${HEALTHCHECK_URL}" > /dev/null; then
                  echo "Healthcheck passed."
                  exit 0
                fi
                sleep 5
              done

              echo "Error: Healthcheck failed after retries."
              exit 1
            fi