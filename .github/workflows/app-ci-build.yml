name: App CI Build

on:
  pull_request:
    branches:
      - main
    paths:
      - "api/**"
      - "dashboard/**"
      - "etl-processor/**"
      - "docker-compose.yml"
      - "docker-compose-prod.yml"
      - ".github/workflows/app-ci-build.yml"
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "api/**"
      - "dashboard/**"
      - "etl-processor/**"
      - "docker-compose.yml"
      - "docker-compose-prod.yml"
      - ".github/workflows/app-ci-build.yml"
  workflow_dispatch:

concurrency:
  group: app-ci-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  compose-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      skip: ${{ steps.check-paths.outputs.skip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if only manifests changed
        id: check-paths
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # For PRs, check if only infrastructure/k8s files changed
            changed_files=$(git diff --name-only origin/main...HEAD)
          else
            # For pushes, check the last commit
            changed_files=$(git diff --name-only HEAD~1...HEAD)
          fi
          
          # Check if any non-infrastructure files changed
          if echo "$changed_files" | grep -qv "^infrastructure/k8s/"; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true
      - name: Validate docker-compose config
        if: steps.check-paths.outputs.skip != 'true'
        env:
          POSTGRES_DB: fire_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          DATABASE_URL: postgresql://postgres:password@db:5432/fire_db
          INFLUXDB_INIT_MODE: setup
          INFLUXDB_USERNAME: admin
          INFLUXDB_PASSWORD: password
          INFLUXDB_ORG: fire-org
          INFLUXDB_BUCKET: fire-bucket
          INFLUXDB_TOKEN: test-token
          INFLUXDB_URL: http://influx:8086
          IMAGE_REGISTRY: ghcr.io/example/repo
          IMAGE_TAG: latest
        run: |
          cat > .env <<EOFENV
          POSTGRES_DB=${POSTGRES_DB}
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          DATABASE_URL=${DATABASE_URL}
          INFLUXDB_INIT_MODE=${INFLUXDB_INIT_MODE}
          INFLUXDB_USERNAME=${INFLUXDB_USERNAME}
          INFLUXDB_PASSWORD=${INFLUXDB_PASSWORD}
          INFLUXDB_ORG=${INFLUXDB_ORG}
          INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
          INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
          INFLUXDB_URL=${INFLUXDB_URL}
          IMAGE_REGISTRY=${IMAGE_REGISTRY}
          IMAGE_TAG=${IMAGE_TAG}
          EOFENV
          docker compose -f docker-compose.yml -f docker-compose-prod.yml config -q
          rm -f .env

  build-images:
    if: github.actor != 'github-actions[bot]' && needs.compose-validate.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: compose-validate
    strategy:
      matrix:
        include:
          - service: api
            context: ./api
          - service: etl-processor
            context: ./etl-processor
          - service: dashboard
            context: ./dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image metadata
        id: meta
        run: |
          set -euo pipefail
          image_registry="ghcr.io/${GITHUB_REPOSITORY,,}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            image_tag="${GITHUB_REF_NAME}"
          else
            image_tag="sha-${GITHUB_SHA::12}"
          fi
          echo "image_registry=${image_registry}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ steps.meta.outputs.image_registry }}/${{ matrix.service }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_registry }}/${{ matrix.service }}:latest

      - name: Save image metadata
        if: matrix.service == 'api'
        run: |
          set -euo pipefail
          cat > image-metadata.json <<EOF
          {
            "image_registry": "${{ steps.meta.outputs.image_registry }}",
            "image_tag": "${{ steps.meta.outputs.image_tag }}"
          }
          EOF

      - name: Upload image metadata
        if: matrix.service == 'api'
        uses: actions/upload-artifact@v4
        with:
          name: image-metadata-${{ github.run_id }}
          path: image-metadata.json
          retention-days: 7

