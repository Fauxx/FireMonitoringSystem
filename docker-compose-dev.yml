version: '3.8'

services:
  # Development overrides: publish internal ports and mount source for quick iteration
  db:
    ports:
      - "5432:5432"

  influx:
    ports:
      - "8086:8086"

  grafana:
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: true
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin

  api:
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: development
    volumes:
      - ./api:/usr/src/app
      - /usr/src/app/node_modules

  nginx:
    ports:
      - "80:80"
      - "443:443"

  mqtt:
    ports:
      - "1883:1883"
      - "9001:9001"
