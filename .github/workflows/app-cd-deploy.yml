name: App CD Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "api/**"
      - "dashboard/**"
      - "etl-processor/**"
      - "docker-compose.yml"
      - "docker-compose-prod.yml"
      - "infrastructure/**"
      - ".github/workflows/app-cd-deploy.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev
      image_tag:
        description: "Override image tag (defaults to SHA/tag)"
        required: false
        type: string

concurrency:
  group: app-cd-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-dev:
    if: github.actor != 'github-actions[bot]' && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: development
    env:
      DEPLOY_ENV: dev
    steps:
      - name: Validate deploy secrets
        run: |
          test -n "${{ secrets.KUBECONFIG }}" || (echo "Missing KUBECONFIG in GitHub Environment secrets" && exit 1)
          test -n "${{ secrets.GHCR_DEPLOY_USERNAME }}" || (echo "Missing GHCR_DEPLOY_USERNAME in GitHub Environment secrets" && exit 1)
          test -n "${{ secrets.GHCR_DEPLOY_TOKEN }}" || (echo "Missing GHCR_DEPLOY_TOKEN in GitHub Environment secrets" && exit 1)

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Configure kubeconfig
        run: |
          set -euo pipefail
          echo "${{ secrets.KUBECONFIG }}" > kubeconfig.yaml

      - name: Deploy to dev cluster
        env:
          KUBECONFIG: kubeconfig.yaml
        run: |
          set -euo pipefail
          IMAGE_TAG="${{ inputs.image_tag }}"
          if [ -z "${IMAGE_TAG}" ]; then
            IMAGE_TAG="sha-${GITHUB_SHA::12}"
          fi
          IMAGE_REGISTRY="ghcr.io/${GITHUB_REPOSITORY,,}"
          OVERLAY_DIR="infrastructure/k8s/overlays/dev"
          pushd "${OVERLAY_DIR}"
          kustomize edit set image api=${IMAGE_REGISTRY}/api:${IMAGE_TAG} etl-processor=${IMAGE_REGISTRY}/etl-processor:${IMAGE_TAG} dashboard=${IMAGE_REGISTRY}/dashboard:${IMAGE_TAG}
          popd
          kubectl apply -k "${OVERLAY_DIR}"
          kubectl rollout status deployment/api -n fire-monitoring-dev --timeout=180s
          kubectl rollout status deployment/etl-processor -n fire-monitoring-dev --timeout=180s
          kubectl rollout status deployment/dashboard -n fire-monitoring-dev --timeout=180s

  deploy-prod:
    if: github.actor != 'github-actions[bot]' && ((github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - name: Validate deploy secrets
        run: |
          test -n "${{ secrets.KUBECONFIG }}" || (echo "Missing KUBECONFIG in GitHub Environment secrets" && exit 1)
          test -n "${{ secrets.GHCR_DEPLOY_USERNAME }}" || (echo "Missing GHCR_DEPLOY_USERNAME in GitHub Environment secrets" && exit 1)
          test -n "${{ secrets.GHCR_DEPLOY_TOKEN }}" || (echo "Missing GHCR_DEPLOY_TOKEN in GitHub Environment secrets" && exit 1)

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Configure kubeconfig
        run: |
          set -euo pipefail
          echo "${{ secrets.KUBECONFIG }}" > kubeconfig.yaml

      - name: Deploy to prod cluster
        env:
          KUBECONFIG: kubeconfig.yaml
        run: |
          set -euo pipefail
          IMAGE_TAG="${{ inputs.image_tag }}"
          if [ -z "${IMAGE_TAG}" ]; then
            if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              IMAGE_TAG="${GITHUB_REF_NAME}"
            else
              IMAGE_TAG="sha-${GITHUB_SHA::12}"
            fi
          fi
          IMAGE_REGISTRY="ghcr.io/${GITHUB_REPOSITORY,,}"
          OVERLAY_DIR="infrastructure/k8s/overlays/prod"
          pushd "${OVERLAY_DIR}"
          kustomize edit set image api=${IMAGE_REGISTRY}/api:${IMAGE_TAG} etl-processor=${IMAGE_REGISTRY}/etl-processor:${IMAGE_TAG} dashboard=${IMAGE_REGISTRY}/dashboard:${IMAGE_TAG}
          popd
          kubectl apply -k "${OVERLAY_DIR}"
          kubectl rollout status deployment/api -n fire-monitoring-prod --timeout=180s
          kubectl rollout status deployment/etl-processor -n fire-monitoring-prod --timeout=180s
          kubectl rollout status deployment/dashboard -n fire-monitoring-prod --timeout=180s

