limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
gzip_min_length 1024;

server {
    listen 80;
    server_name localhost your-domain.com www.your-domain.com;

    # Internal Docker DNS resolver: Required for Nginx to "find" the 'api' or 'grafana' 
    # containers by their service names. 127.0.0.11 is the standard Docker DNS IP.
    resolver 127.0.0.11 ipv6=off valid=10s;

    # --- SECURITY HEADERS ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' http://localhost:18080 http://localhost:13000 ws: wss:; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'self';" always;
    client_body_timeout 30s;
    keepalive_timeout 65s;

    # Max upload size: Useful if you later add a feature to upload floor plans or reports.
    client_max_body_size 50M;

    # --- LOGGING ---
    # Keeps track of every visit and every error. Essential for your OJT troubleshooting.
    access_log /var/log/nginx/fire-monitoring-access.log;
    error_log /var/log/nginx/fire-monitoring-error.log;

    # --- STATIC FILE SERVING ---
    # The 'root' is the base folder inside the container where your HTML/CSS lives.
    root /usr/share/nginx/html;
    index login.html index.html;

    # Default location: If a user visits the root URL (/), try to find the file.
    # If the file doesn't exist, fallback to the login page.
    location / {
        try_files $uri $uri/ /login.html;
    }

    # CSS Assets: Specifically maps the /css/ URL path to your dashboard/public/css folder.
    # Uses 'root' so Nginx looks for files in /usr/share/nginx/html/css/.
    location /css/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ =404;
    }

    # Protected Area: This handles all files inside your 'protected' folder (dashboard, analytics, etc.)
    # If someone tries to access /protected/ directly, it defaults to dashboard.html.
    location /protected/ {
        root /usr/share/nginx/html;
        index dashboard.html;
        # If the specific .html file isn't found, kick the user back to the login screen.
        try_files $uri $uri/ /login.html;
    }

    # --- REVERSE PROXY CONFIGURATION ---

    # API Proxy: Forwards any request starting with /api/ to your Node.js backend.
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        # Using a variable ($upstream_api) prevents Nginx from crashing if the API container starts late.
        set $upstream_api http://api:8000;
        proxy_pass $upstream_api;

        # Standard headers to ensure the API knows the real IP of the user, not just the Nginx IP.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Consolidated Auth Proxy: Handles /auth/login and /auth/signup in one block.
    # This keeps your code "DRY" (Don't Repeat Yourself) and easier to maintain.
    location /auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        set $upstream_auth http://api:8000;
        proxy_pass $upstream_auth;
    
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Grafana Proxy: Forwards traffic to your monitoring dashboards on port 3000.
    location /grafana/ {
        set $upstream_grafana http://grafana:3000;
        proxy_pass $upstream_grafana;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $http_host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_send_timeout 60s;
        proxy_read_timeout 90s;
    }
    # Loki Proxy: Forwards log ingestion and query traffic to port 3100.
    # Explicit rewrite ensures /loki/* becomes /* for upstream Loki endpoints.
    location = /loki {
        return 301 /loki/;
    }

    location /loki/ {
        rewrite ^/loki/(.*)$ /$1 break;
        proxy_pass http://loki:3100;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


    # --- SYSTEM UTILITIES ---

    # Health check: Used by Docker or a Load Balancer to see if the Nginx container is "alive".
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Security: Deny access to hidden files like .env or .git folders.
    location ~ /\. { 
        deny all; 
        access_log off; 
        log_not_found off; 
    }
}