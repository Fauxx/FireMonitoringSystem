name: PR Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - "api/**"
      - "dashboard/**"
      - "etl-processor/**"
      - "infrastructure/**"
      - "docker-compose.yml"
      - "docker-compose-dev.yml"
      - "docker-compose-prod.yml"
      - ".github/workflows/ci-pr.yml"
      - ".github/workflows/terraform-execution.yml"
      - ".github/actions/terraform-contract/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api-validation:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: api/package-lock.json

      - name: Install API dependencies
        working-directory: api
        run: npm ci

      - name: Validate API
        working-directory: api
        run: |
          npm run --if-present lint
          npm run --if-present test

  etl-validation:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: etl-processor/requirements.txt

      - name: Install ETL dependencies
        working-directory: etl-processor
        run: pip install -r requirements.txt

      - name: Validate ETL source
        working-directory: etl-processor
        run: python -m compileall src

  terraform-validation:
    if: github.actor != 'github-actions[bot]'
    uses: ./.github/workflows/terraform-execution.yml
    with:
      execution_mode: plan-only
      terraform_workspace: ci-pr
      use_backend: false
      simulation_profile: blank-project
      require_secrets: false
      run_plan: false
      artifact_prefix: ci-pr-terraform
    secrets: inherit

  compose-validation:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose topology (API, Dashboard, ETL, MQTT)
        env:
          POSTGRES_DB: fire_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          DATABASE_URL: postgresql://postgres:password@db:5432/fire_db
          INFLUXDB_INIT_MODE: setup
          INFLUXDB_USERNAME: admin
          INFLUXDB_PASSWORD: password
          INFLUXDB_ORG: fire-org
          INFLUXDB_BUCKET: fire-bucket
          INFLUXDB_TOKEN: test-token
          INFLUXDB_URL: http://influx:8086
          IMAGE_REGISTRY: ghcr.io/example/repo
          IMAGE_TAG: latest
        run: |
          cat > .env <<EOFENV
          POSTGRES_DB=${POSTGRES_DB}
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          DATABASE_URL=${DATABASE_URL}
          INFLUXDB_INIT_MODE=${INFLUXDB_INIT_MODE}
          INFLUXDB_USERNAME=${INFLUXDB_USERNAME}
          INFLUXDB_PASSWORD=${INFLUXDB_PASSWORD}
          INFLUXDB_ORG=${INFLUXDB_ORG}
          INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
          INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
          INFLUXDB_URL=${INFLUXDB_URL}
          IMAGE_REGISTRY=${IMAGE_REGISTRY}
          IMAGE_TAG=${IMAGE_TAG}
          EOFENV
          docker compose -f docker-compose.yml -f docker-compose-dev.yml config -q
          docker compose -f docker-compose.yml -f docker-compose-prod.yml config -q
          rm -f .env
