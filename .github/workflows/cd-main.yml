name: Main Build Validation

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "dashboard/**"
      - "etl-processor/**"
      - "infrastructure/**"
      - "docker-compose.yml"
      - "docker-compose-prod.yml"
      - ".github/workflows/cd-main.yml"
      - ".github/actions/terraform-contract/**"
  workflow_dispatch:
    inputs:
      execution_mode:
        description: "Execution mode"
        required: true
        type: choice
        options:
          - plan-only
          - apply
          - destroy-recreate
        default: plan-only
      terraform_workspace:
        description: "Terraform workspace"
        required: true
        type: string
        default: prod
      use_backend:
        description: "Initialize remote backend"
        required: true
        type: boolean
        default: true
      simulation_profile:
        description: "Simulation profile"
        required: true
        type: choice
        options:
          - blank-project
          - existing-state
          - recovery
        default: existing-state

concurrency:
  group: cd-main-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  build-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t local/api-ci:latest ./api

      - name: Build ETL image
        run: docker build -t local/etl-processor-ci:latest ./etl-processor

      - name: Build Dashboard image
        run: docker build -t local/dashboard-ci:latest ./dashboard

      - name: Validate docker-compose configuration (all monorepo services)
        env:
          POSTGRES_DB: fire_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          DATABASE_URL: postgresql://postgres:password@db:5432/fire_db
          INFLUXDB_INIT_MODE: setup
          INFLUXDB_USERNAME: admin
          INFLUXDB_PASSWORD: password
          INFLUXDB_ORG: fire-org
          INFLUXDB_BUCKET: fire-bucket
          INFLUXDB_TOKEN: test-token
          INFLUXDB_URL: http://influx:8086
          IMAGE_REGISTRY: ghcr.io/example/repo
          IMAGE_TAG: latest
        run: |
          cat > .env <<EOFENV
          POSTGRES_DB=${POSTGRES_DB}
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          DATABASE_URL=${DATABASE_URL}
          INFLUXDB_INIT_MODE=${INFLUXDB_INIT_MODE}
          INFLUXDB_USERNAME=${INFLUXDB_USERNAME}
          INFLUXDB_PASSWORD=${INFLUXDB_PASSWORD}
          INFLUXDB_ORG=${INFLUXDB_ORG}
          INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
          INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
          INFLUXDB_URL=${INFLUXDB_URL}
          IMAGE_REGISTRY=${IMAGE_REGISTRY}
          IMAGE_TAG=${IMAGE_TAG}
          EOFENV
          docker compose -f docker-compose.yml -f docker-compose-prod.yml config -q
          rm -f .env

  terraform-full-provision:
    if: github.actor != 'github-actions[bot]'
    needs: build-and-validate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        shell: bash
        working-directory: infrastructure/terraform
    env:
      TF_WORKSPACE: ${{ github.event_name == 'workflow_dispatch' && inputs.terraform_workspace || 'prod' }}
      TERRAFORM_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.execution_mode || 'plan-only' }}
      USE_BACKEND: ${{ github.event_name == 'workflow_dispatch' && inputs.use_backend || 'true' }}
      SIMULATION_PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.simulation_profile || 'existing-state' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Resolve backend key
        id: backend-key
        env:
          TF_STATE_KEY_PREFIX: ${{ secrets.TF_STATE_KEY_PREFIX }}
        run: |
          set -euo pipefail
          prefix="${TF_STATE_KEY_PREFIX:-terraform/fire-monitoring}"
          echo "backend_key=${prefix}/${TF_WORKSPACE}.tfstate" >> "$GITHUB_OUTPUT"

      - name: Apply shared Terraform contract
        uses: ./.github/actions/terraform-contract
        with:
          working_directory: infrastructure/terraform
          terraform_workspace: ${{ env.TF_WORKSPACE }}
          use_backend: ${{ env.USE_BACKEND }}
          require_secrets: "true"
          do_token: ${{ secrets.TF_VAR_do_token }}
          github_token: ${{ secrets.TF_VAR_github_token }}
          github_owner: ${{ secrets.TF_VAR_github_owner }}
          github_repo: ${{ secrets.TF_VAR_github_repo }}
          ssh_key_ids: ${{ secrets.TF_VAR_ssh_key_ids }}
          do_ssh_host_fingerprint: ${{ secrets.TF_VAR_do_ssh_host_fingerprint }}
          do_ssh_host: ${{ secrets.DO_SSH_HOST }}
          do_ssh_port: ${{ secrets.DO_SSH_PORT }}
          do_ssh_user: ${{ secrets.DO_SSH_USER }}
          backend_bucket: ${{ secrets.TF_STATE_BUCKET }}
          backend_region: ${{ secrets.TF_STATE_REGION }}
          backend_key: ${{ steps.backend-key.outputs.backend_key }}
          backend_endpoint: ${{ secrets.TF_STATE_ENDPOINT }}
          backend_access_key: ${{ secrets.TF_STATE_ACCESS_KEY }}
          backend_secret_key: ${{ secrets.TF_STATE_SECRET_KEY }}

      - name: Terraform fmt
        run: terraform fmt -check

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: tfplan
        env:
          PLAN_FILE: tfplan.binary
        run: |
          set -euo pipefail
          set +e
          # Intentionally keep refresh enabled so plan reflects real cloud/state delta.
          terraform plan -input=false -detailed-exitcode -out="${PLAN_FILE}"
          exit_code=$?
          set -e
          if [ "${exit_code}" -ne 0 ] && [ "${exit_code}" -ne 2 ]; then
            echo "Terraform plan failed with exit code ${exit_code}"
            exit "${exit_code}"
          fi
          terraform show -no-color "${PLAN_FILE}" > tfplan.txt
          echo "plan_exit_code=${exit_code}" >> "$GITHUB_OUTPUT"

      - name: Destroy infrastructure for restart simulation
        if: ${{ env.TERRAFORM_MODE == 'destroy-recreate' }}
        run: |
          set -euo pipefail
          terraform destroy -input=false -auto-approve
          terraform plan -input=false -out=tfplan.binary
          terraform show -no-color tfplan.binary > tfplan.txt

      - name: Terraform apply
        if: ${{ env.TERRAFORM_MODE == 'apply' || env.TERRAFORM_MODE == 'destroy-recreate' }}
        run: terraform apply -input=false -auto-approve tfplan.binary

      - name: Export terraform outputs
        run: terraform output -json > terraform-outputs.json

      - name: Upload terraform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cd-main-terraform-${{ github.run_id }}-${{ env.TF_WORKSPACE }}-${{ env.SIMULATION_PROFILE }}
          path: |
            infrastructure/terraform/tfplan.binary
            infrastructure/terraform/tfplan.txt
            infrastructure/terraform/terraform-outputs.json
            infrastructure/terraform/runtime.auto.tfvars
          if-no-files-found: error
          retention-days: 7
