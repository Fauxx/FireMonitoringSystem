# Nginx Configuration for Fire Monitoring Web Application
# Place this file at: /etc/nginx/sites-available/fire-monitoring

# Remove explicit upstream blocks; use Docker DNS resolver instead
# upstream api_service { server api:8000; keepalive 64; }
# upstream grafana { server grafana:3000; }

server {
    listen 80;
    # listen 443 ssl http2;  # Uncomment for HTTPS
    server_name your-domain.com www.your-domain.com;

    # SSL Configuration (uncomment after getting certificates)
    # ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;

    resolver 127.0.0.11 ipv6=off valid=10s;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Max upload size (for exports and uploads)
    client_max_body_size 50M;

    # Logging
    access_log /var/log/nginx/fire-monitoring-access.log;
    error_log /var/log/nginx/fire-monitoring-error.log;

    # Serve dashboard static files at root
    root /usr/share/nginx/html;
    index login.html index.html;

    location / {
        try_files $uri $uri/ /login.html;
    }

    # Serve static assets explicitly
    location ^~ /styles/ {
        alias /usr/share/nginx/html/styles/;
        try_files $uri =404;
    }

    location ^~ /protected/ {
        alias /usr/share/nginx/html/protected/;
        try_files $uri $uri/ =404;
    }

    # Optional: keep API proxy under /api/
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        
        # WebSocket support (if needed in future)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Forward real IP
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Grafana proxy
    location /grafana/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy auth endpoints to API
    location ^~ /auth/ {
        try_files $uri @api_auth;
    }

    location @api_auth {
        proxy_pass http://api:8000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Explicit auth endpoints to avoid path issues
    location = /auth/signup {
        proxy_pass http://api:8000/auth/signup;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /auth/login {
        proxy_pass http://api:8000/auth/login;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location /dashboard/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }
}
