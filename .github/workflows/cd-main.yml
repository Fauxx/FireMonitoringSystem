name: Deprecated Main Build Validation

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "dashboard/**"
      - "etl-processor/**"
      - "infrastructure/**"
      - "docker-compose.yml"
      - "docker-compose-prod.yml"
      - ".github/workflows/cd-main.yml"
      - ".github/workflows/terraform-execution.yml"
      - ".github/actions/terraform-contract/**"
  workflow_dispatch:
    inputs:
      execution_mode:
        description: "Execution mode"
        required: true
        type: choice
        options:
          - plan-only
          - apply
          - destroy-recreate
        default: plan-only
      terraform_workspace:
        description: "Terraform workspace"
        required: true
        type: string
        default: prod
      use_backend:
        description: "Initialize remote backend"
        required: true
        type: boolean
        default: true
      simulation_profile:
        description: "Simulation profile"
        required: true
        type: choice
        options:
          - blank-project
          - existing-state
          - recovery
        default: existing-state

concurrency:
  group: cd-main-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t local/api-ci:latest ./api

      - name: Build ETL image
        run: docker build -t local/etl-processor-ci:latest ./etl-processor

      - name: Build Dashboard image
        run: docker build -t local/dashboard-ci:latest ./dashboard

      - name: Validate docker-compose configuration
        env:
          POSTGRES_DB: fire_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          DATABASE_URL: postgresql://postgres:password@db:5432/fire_db
          INFLUXDB_INIT_MODE: setup
          INFLUXDB_USERNAME: admin
          INFLUXDB_PASSWORD: password
          INFLUXDB_ORG: fire-org
          INFLUXDB_BUCKET: fire-bucket
          INFLUXDB_TOKEN: test-token
          INFLUXDB_URL: http://influx:8086
          IMAGE_REGISTRY: ghcr.io/example/repo
          IMAGE_TAG: latest
        run: |
          cat > .env <<EOFENV
          POSTGRES_DB=${POSTGRES_DB}
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          DATABASE_URL=${DATABASE_URL}
          INFLUXDB_INIT_MODE=${INFLUXDB_INIT_MODE}
          INFLUXDB_USERNAME=${INFLUXDB_USERNAME}
          INFLUXDB_PASSWORD=${INFLUXDB_PASSWORD}
          INFLUXDB_ORG=${INFLUXDB_ORG}
          INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
          INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
          INFLUXDB_URL=${INFLUXDB_URL}
          IMAGE_REGISTRY=${IMAGE_REGISTRY}
          IMAGE_TAG=${IMAGE_TAG}
          EOFENV
          docker compose -f docker-compose.yml -f docker-compose-prod.yml config -q
          rm -f .env

  terraform-full-provision:
    if: github.actor != 'github-actions[bot]'
    needs: build-and-validate
    uses: ./.github/workflows/terraform-execution.yml
    with:
      execution_mode: ${{ github.event_name == 'workflow_dispatch' && inputs.execution_mode || 'plan-only' }}
      terraform_workspace: ${{ github.event_name == 'workflow_dispatch' && inputs.terraform_workspace || 'prod' }}
      use_backend: ${{ github.event_name == 'workflow_dispatch' && inputs.use_backend || true }}
      simulation_profile: ${{ github.event_name == 'workflow_dispatch' && inputs.simulation_profile || 'existing-state' }}
      require_secrets: true
      run_plan: true
      artifact_prefix: cd-main-terraform
    secrets: inherit