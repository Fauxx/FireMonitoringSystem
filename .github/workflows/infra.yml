name: Manual Terraform Validation

on:
  workflow_dispatch:
    inputs:
      execution_mode:
        description: "Execution mode"
        required: true
        type: choice
        options:
          - plan-only
          - apply
          - destroy-recreate
        default: plan-only
      use_backend:
        description: "Initialize remote backend (DigitalOcean Spaces)"
        required: true
        type: boolean
        default: true
      terraform_workspace:
        description: "Terraform workspace"
        required: true
        type: string
        default: prod
      simulation_profile:
        description: "Simulation profile"
        required: true
        type: choice
        options:
          - blank-project
          - existing-state
          - recovery
        default: blank-project

concurrency:
  group: infra-manual
  cancel-in-progress: false

jobs:
  terraform-run:
    if: github.actor != 'github-actions[bot]'
    uses: ./.github/workflows/terraform-execution.yml
    with:
      execution_mode: ${{ inputs.execution_mode }}
      terraform_workspace: ${{ inputs.terraform_workspace }}
      use_backend: ${{ inputs.use_backend }}
      simulation_profile: ${{ inputs.simulation_profile }}
      require_secrets: true
      run_plan: true
      artifact_prefix: terraform
    secrets: inherit
