name: Terraform Plan

on:
  pull_request:
    paths:
      - "infrastructure/terraform/**"
  workflow_dispatch:
    inputs:
      use_backend:
        description: "Initialize configured backend (if false, use local backend)"
        required: true
        type: boolean
        default: false
      terraform_workspace:
        description: "Terraform workspace to use for manual plans"
        required: true
        type: string
        default: "prod"

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    defaults:
      run:
        shell: bash
        working-directory: infrastructure/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Clean local tfvars
        run: rm -f terraform.tfvars runtime.auto.tfvars

      - name: Build PR runtime tfvars
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          cat > runtime.auto.tfvars <<EOF
          require_secrets = false
          EOF

      - name: Verify required secrets
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          TF_VAR_do_token: ${{ secrets.TF_VAR_do_token }}
          TF_VAR_github_token: ${{ secrets.TF_VAR_github_token }}
          TF_VAR_github_owner: ${{ secrets.TF_VAR_github_owner }}
          TF_VAR_github_repo: ${{ secrets.TF_VAR_github_repo }}
          TF_VAR_ssh_key_ids: ${{ secrets.TF_VAR_ssh_key_ids }}
          TF_VAR_do_ssh_host_fingerprint: ${{ secrets.TF_VAR_do_ssh_host_fingerprint }}
        run: |
          set -euo pipefail
          for v in \
            TF_VAR_do_token \
            TF_VAR_github_token \
            TF_VAR_github_owner \
            TF_VAR_github_repo \
            TF_VAR_ssh_key_ids \
            TF_VAR_do_ssh_host_fingerprint; do
            if [ -z "${!v}" ]; then
              echo "Missing required secret: $v"
              exit 1
            fi
          done

      - name: Build runtime tfvars
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          TF_VAR_do_token: ${{ secrets.TF_VAR_do_token }}
          TF_VAR_github_token: ${{ secrets.TF_VAR_github_token }}
          TF_VAR_github_owner: ${{ secrets.TF_VAR_github_owner }}
          TF_VAR_github_repo: ${{ secrets.TF_VAR_github_repo }}
          TF_VAR_ssh_key_ids: ${{ secrets.TF_VAR_ssh_key_ids }}
          TF_VAR_do_ssh_host_fingerprint: ${{ secrets.TF_VAR_do_ssh_host_fingerprint }}
        run: |
          set -euo pipefail
          cat > runtime.auto.tfvars <<EOF
          require_secrets = true
          do_token     = "${TF_VAR_do_token}"
          github_token = "${TF_VAR_github_token}"
          github_owner = "${TF_VAR_github_owner}"
          github_repo  = "${TF_VAR_github_repo}"
          ssh_key_ids  = ${TF_VAR_ssh_key_ids}
          do_ssh_host_fingerprint = "${TF_VAR_do_ssh_host_fingerprint}"
          EOF

      - name: Terraform fmt
        run: terraform fmt -check

      - name: Terraform init (no backend)
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.use_backend }}
        run: terraform init -backend=false -input=false

      - name: Terraform init (backend)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.use_backend }}
        run: terraform init -input=false

      - name: Select terraform workspace
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          TF_WORKSPACE: ${{ inputs.terraform_workspace }}
        run: |
          set -euo pipefail
          terraform workspace select "${TF_WORKSPACE}" || terraform workspace new "${TF_WORKSPACE}"

      - name: Terraform validate
        run: terraform validate 2>&1 | tee terraform-validate.log

      - name: Terraform plan (no refresh)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          PLAN_FILE: tfplan.binary
        run: |
          set -euo pipefail
          set +e
          terraform plan -input=false -refresh=false -lock=false -detailed-exitcode -out="${PLAN_FILE}" 2>&1 | tee terraform-plan.log
          exit_code=$?
          set -e
          echo "TF_PLAN_EXIT_CODE=${exit_code}" >> "$GITHUB_ENV"

          case "$exit_code" in
            0)
              echo "No infrastructure changes detected."
              ;;
            2)
              echo "Infrastructure changes detected (plan-only success)."
              ;;
            *)
              echo "Terraform plan failed with exit code $exit_code"
              exit "$exit_code"
              ;;
          esac

      - name: Upload terraform plan artifact
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.run_id }}
          path: |
            infrastructure/terraform/tfplan.binary
            infrastructure/terraform/terraform-plan.log
            infrastructure/terraform/terraform-validate.log
          if-no-files-found: error
          retention-days: 7

      - name: Summarize terraform plan run
        if: ${{ always() }}
        env:
          BACKEND_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.use_backend && 'backend' || 'local-no-backend' }}
          WORKSPACE_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.terraform_workspace || 'n/a-pr-check' }}
          PLAN_EXIT_CODE: ${{ env.TF_PLAN_EXIT_CODE || 'n/a' }}
        run: |
          {
            echo "## Terraform Plan Summary"
            echo
            echo "- Event: ${{ github.event_name }}"
            echo "- Backend mode: ${BACKEND_MODE}"
            echo "- Workspace: ${WORKSPACE_NAME}"
            echo "- Plan exit code: ${PLAN_EXIT_CODE}"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "- Plan artifact: terraform-plan-${{ github.run_id }}"
            else
              echo "- Plan artifact: not generated for pull_request checks"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
