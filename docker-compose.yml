version: '3.8'

networks:
  fire-net:
    driver: bridge

volumes:
  db_data:
  grafana_data:
  influx_data:
  nginx_logs:
  api_logs:

services:
  # PostgreSQL Database
  db:
    image: postgres:14-alpine
    container_name: fire-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fire_monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-fireuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - fire-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fireuser} -d ${POSTGRES_DB:-fire_monitoring}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # InfluxDB (time-series storage)
  influx:
    image: influxdb:2.7-alpine
    container_name: fire-influx
    restart: unless-stopped
    env_file: .env
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=${INFLUXDB_INIT_MODE:-setup}
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USERNAME:-fireops}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD:-changeme}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-fire-monitoring}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-sensor-data}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:-influx-token}
    volumes:
      - influx_data:/var/lib/influxdb2
      - ./infrastructure/influxdb/config:/etc/influxdb2
    networks:
      - fire-net
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: fire-grafana
    restart: unless-stopped
    env_file: .env
    environment:
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ALLOW_EMBEDDING=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - fire-net
    depends_on:
      - db
      - influx

  # Node.js Web Application
  api:
    build: ./api
    container_name: fire-api
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=8000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-fireuser}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-fire_monitoring}
    volumes:
      - api_logs:/usr/src/app/logs
    networks:
      - fire-net
    depends_on:
      db:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully

  # Nginx Reverse Proxy erty
  nginx:
    image: nginx:alpine
    container_name: fire-nginx
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./dashboard/public:/usr/share/nginx/html
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - fire-net
    depends_on:
      - api

  # MQTT broker
  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: fire-mqtt
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./infrastructure/mqtt/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./infrastructure/mqtt/data:/mosquitto/data
    networks:
      - fire-net

  # Flyway migrations
  flyway:
    image: flyway/flyway:10-alpine
    container_name: fire-migrations
    volumes:
      - ./infrastructure/sql:/flyway/sql
    env_file: .env
    environment:
      - FLYWAY_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-fire_monitoring}
      - FLYWAY_USER=${POSTGRES_USER:-fireuser}
      - FLYWAY_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    depends_on:
      db:
        condition: service_healthy
    command: -connectRetries=60 migrate
    networks:
      - fire-net