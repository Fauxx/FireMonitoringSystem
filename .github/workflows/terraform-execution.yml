name: Terraform Execution Reusable

on:
  workflow_call:
    inputs:
      execution_mode:
        description: Terraform execution mode
        required: false
        type: string
        default: plan-only
      terraform_workspace:
        description: Terraform workspace to run against
        required: false
        type: string
        default: prod
      use_backend:
        description: Whether to initialize remote backend
        required: false
        type: boolean
        default: true
      simulation_profile:
        description: Simulation profile identifier for artifacts
        required: false
        type: string
        default: existing-state
      require_secrets:
        description: Whether bootstrap terraform secrets are mandatory
        required: false
        type: boolean
        default: true
      run_plan:
        description: Whether to run terraform plan/apply flow
        required: false
        type: boolean
        default: true
      artifact_prefix:
        description: Prefix for uploaded artifact names
        required: false
        type: string
        default: terraform
    secrets:
      TF_VAR_do_token:
        required: false
      TF_VAR_github_token:
        required: false
      TF_VAR_github_owner:
        required: false
      TF_VAR_github_repo:
        required: false
      TF_VAR_ssh_key_ids:
        required: false
      TF_VAR_do_ssh_host_fingerprint:
        required: false
      DO_SSH_HOST:
        required: false
      DO_SSH_PORT:
        required: false
      DO_SSH_USER:
        required: false
      TF_STATE_BUCKET:
        required: false
      TF_STATE_REGION:
        required: false
      TF_STATE_KEY_PREFIX:
        required: false
      TF_STATE_ENDPOINT:
        required: false
      TF_STATE_ACCESS_KEY:
        required: false
      TF_STATE_SECRET_KEY:
        required: false

jobs:
  terraform-run:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      actions: read
    defaults:
      run:
        shell: bash
        working-directory: infrastructure/terraform
    env:
      TF_WORKSPACE: ${{ inputs.terraform_workspace }}
      TERRAFORM_MODE: ${{ inputs.execution_mode }}
      USE_BACKEND: ${{ inputs.use_backend && 'true' || 'false' }}
      SIMULATION_PROFILE: ${{ inputs.simulation_profile }}
      REQUIRE_SECRETS: ${{ inputs.require_secrets && 'true' || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Resolve backend key
        id: backend-key
        env:
          TF_STATE_KEY_PREFIX: ${{ secrets.TF_STATE_KEY_PREFIX }}
        run: |
          set -euo pipefail
          prefix="${TF_STATE_KEY_PREFIX:-terraform/fire-monitoring}"
          echo "backend_key=${prefix}/${TF_WORKSPACE}.tfstate" >> "$GITHUB_OUTPUT"

      - name: Apply shared Terraform contract
        uses: ./.github/actions/terraform-contract
        with:
          working_directory: infrastructure/terraform
          terraform_workspace: ${{ env.TF_WORKSPACE }}
          use_backend: ${{ env.USE_BACKEND }}
          require_secrets: ${{ env.REQUIRE_SECRETS }}
          do_token: ${{ secrets.TF_VAR_do_token }}
          github_token: ${{ secrets.TF_VAR_github_token }}
          github_owner: ${{ secrets.TF_VAR_github_owner }}
          github_repo: ${{ secrets.TF_VAR_github_repo }}
          ssh_key_ids: ${{ secrets.TF_VAR_ssh_key_ids }}
          do_ssh_host_fingerprint: ${{ secrets.TF_VAR_do_ssh_host_fingerprint }}
          do_ssh_host: ${{ secrets.DO_SSH_HOST }}
          do_ssh_port: ${{ secrets.DO_SSH_PORT }}
          do_ssh_user: ${{ secrets.DO_SSH_USER }}
          backend_bucket: ${{ secrets.TF_STATE_BUCKET }}
          backend_region: ${{ secrets.TF_STATE_REGION }}
          backend_key: ${{ steps.backend-key.outputs.backend_key }}
          backend_endpoint: ${{ secrets.TF_STATE_ENDPOINT }}
          backend_access_key: ${{ secrets.TF_STATE_ACCESS_KEY }}
          backend_secret_key: ${{ secrets.TF_STATE_SECRET_KEY }}

      - name: Terraform fmt
        run: terraform fmt -recursive -check

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        if: ${{ inputs.run_plan }}
        id: tfplan
        env:
          PLAN_FILE: tfplan.binary
        run: |
          set -euo pipefail
          set +e
          terraform plan -input=false -lock-timeout=300s -detailed-exitcode -out="${PLAN_FILE}"
          exit_code=$?
          set -e
          if [ "${exit_code}" -ne 0 ] && [ "${exit_code}" -ne 2 ]; then
            echo "Terraform plan failed with exit code ${exit_code}"
            exit "${exit_code}"
          fi
          terraform show -no-color "${PLAN_FILE}" > tfplan.txt
          echo "plan_exit_code=${exit_code}" >> "$GITHUB_OUTPUT"

      - name: Destroy infrastructure for restart simulation
        if: ${{ inputs.run_plan && env.TERRAFORM_MODE == 'destroy-recreate' }}
        run: |
          set -euo pipefail
          terraform destroy -input=false -lock-timeout=300s -auto-approve
          terraform plan -input=false -lock-timeout=300s -out=tfplan.binary
          terraform show -no-color tfplan.binary > tfplan.txt

      - name: Terraform apply
        if: ${{ inputs.run_plan && (env.TERRAFORM_MODE == 'apply' || env.TERRAFORM_MODE == 'destroy-recreate') }}
        run: terraform apply -input=false -lock-timeout=300s -auto-approve tfplan.binary

      - name: Export terraform outputs
        if: ${{ inputs.run_plan }}
        run: terraform output -json > terraform-outputs.json

      - name: Upload terraform artifacts
        if: ${{ inputs.run_plan }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-${{ github.run_id }}-${{ env.TF_WORKSPACE }}-${{ env.SIMULATION_PROFILE }}
          path: |
            infrastructure/terraform/tfplan.binary
            infrastructure/terraform/tfplan.txt
            infrastructure/terraform/terraform-outputs.json
            infrastructure/terraform/runtime.auto.tfvars
          if-no-files-found: error
          retention-days: 7
