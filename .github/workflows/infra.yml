concurrency:
  group: infra-manual
  cancel-in-progress: false

jobs:
  terraform-plan:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    defaults:
      run:
        shell: bash
        working-directory: infrastructure/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Verify required secrets
        env:
          TF_VAR_do_token: ${{ secrets.TF_VAR_do_token }}
          TF_VAR_github_token: ${{ secrets.TF_VAR_github_token }}
          TF_VAR_github_owner: ${{ secrets.TF_VAR_github_owner }}
          TF_VAR_github_repo: ${{ secrets.TF_VAR_github_repo }}
          TF_VAR_ssh_key_ids: ${{ secrets.TF_VAR_ssh_key_ids }}
          TF_VAR_do_ssh_host_fingerprint: ${{ secrets.TF_VAR_do_ssh_host_fingerprint }}
        run: |
          set -euo pipefail
          for v in \
            TF_VAR_do_token \
            TF_VAR_github_token \
            TF_VAR_github_owner \
            TF_VAR_github_repo \
            TF_VAR_ssh_key_ids \
            TF_VAR_do_ssh_host_fingerprint; do
            if [ -z "${!v}" ]; then
              echo "Missing required secret: $v"
              exit 1
            fi
          done

      - name: Build runtime tfvars
        env:
          TF_VAR_do_token: ${{ secrets.TF_VAR_do_token }}
          TF_VAR_github_token: ${{ secrets.TF_VAR_github_token }}
          TF_VAR_github_owner: ${{ secrets.TF_VAR_github_owner }}
          TF_VAR_github_repo: ${{ secrets.TF_VAR_github_repo }}
          TF_VAR_ssh_key_ids: ${{ secrets.TF_VAR_ssh_key_ids }}
          TF_VAR_do_ssh_host_fingerprint: ${{ secrets.TF_VAR_do_ssh_host_fingerprint }}
        run: |
          set -euo pipefail
          rm -f terraform.tfvars
          cat > runtime.auto.tfvars <<EOF
          require_secrets = true
          do_token     = "${TF_VAR_do_token}"
          github_token = "${TF_VAR_github_token}"
          github_owner = "${TF_VAR_github_owner}"
          github_repo  = "${TF_VAR_github_repo}"
          ssh_key_ids  = ${TF_VAR_ssh_key_ids}
          do_ssh_host_fingerprint = "${TF_VAR_do_ssh_host_fingerprint}"
          EOF

      - name: Terraform fmt
        run: terraform fmt -check

      - name: Terraform init (no backend)
        if: ${{ !inputs.use_backend }}
        run: terraform init -backend=false -input=false

      - name: Terraform init (backend)
        if: ${{ inputs.use_backend }}
        run: terraform init -input=false

      - name: Select terraform workspace
        env:
          TF_WORKSPACE: ${{ inputs.terraform_workspace }}
        run: |
          set -euo pipefail
          terraform workspace select "${TF_WORKSPACE}" || terraform workspace new "${TF_WORKSPACE}"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        env:
          PLAN_FILE: tfplan.binary
        run: |
          set -euo pipefail
          set +e
          terraform plan -input=false -refresh=false -lock=false -detailed-exitcode -out="${PLAN_FILE}"
          exit_code=$?
          set -e
          if [ "${exit_code}" -ne 0 ] && [ "${exit_code}" -ne 2 ]; then
            echo "Terraform plan failed with exit code ${exit_code}"
            exit "${exit_code}"
          fi

      - name: Upload terraform plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.run_id }}
          path: infrastructure/terraform/tfplan.binary
          if-no-files-found: error
          retention-days: 7
