name: Manual Terraform Validation

on:
  workflow_dispatch:
    inputs:
      execution_mode:
        description: "Execution mode"
        required: true
        type: choice
        options:
          - plan-only
          - apply
          - destroy-recreate
        default: plan-only
      use_backend:
        description: "Initialize remote backend (DigitalOcean Spaces)"
        required: true
        type: boolean
        default: true
      terraform_workspace:
        description: "Terraform workspace"
        required: true
        type: string
        default: prod
      simulation_profile:
        description: "Simulation profile"
        required: true
        type: choice
        options:
          - blank-project
          - existing-state
          - recovery
        default: blank-project

concurrency:
  group: infra-manual
  cancel-in-progress: false

jobs:
  terraform-run:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      actions: read
    defaults:
      run:
        shell: bash
        working-directory: infrastructure/terraform
    env:
      TF_WORKSPACE: ${{ inputs.terraform_workspace }}
      TERRAFORM_MODE: ${{ inputs.execution_mode }}
      USE_BACKEND: ${{ inputs.use_backend }}
      SIMULATION_PROFILE: ${{ inputs.simulation_profile }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Resolve backend key
        id: backend-key
        env:
          TF_STATE_KEY_PREFIX: ${{ secrets.TF_STATE_KEY_PREFIX }}
        run: |
          set -euo pipefail
          prefix="${TF_STATE_KEY_PREFIX:-terraform/fire-monitoring}"
          echo "backend_key=${prefix}/${TF_WORKSPACE}.tfstate" >> "$GITHUB_OUTPUT"

      - name: Apply shared Terraform contract
        uses: ./.github/actions/terraform-contract
        with:
          working_directory: infrastructure/terraform
          terraform_workspace: ${{ env.TF_WORKSPACE }}
          use_backend: ${{ env.USE_BACKEND }}
          require_secrets: "true"
          do_token: ${{ secrets.TF_VAR_do_token }}
          github_token: ${{ secrets.TF_VAR_github_token }}
          github_owner: ${{ secrets.TF_VAR_github_owner }}
          github_repo: ${{ secrets.TF_VAR_github_repo }}
          ssh_key_ids: ${{ secrets.TF_VAR_ssh_key_ids }}
          do_ssh_host_fingerprint: ${{ secrets.TF_VAR_do_ssh_host_fingerprint }}
          do_ssh_host: ${{ secrets.DO_SSH_HOST }}
          do_ssh_port: ${{ secrets.DO_SSH_PORT }}
          do_ssh_user: ${{ secrets.DO_SSH_USER }}
          backend_bucket: ${{ secrets.TF_STATE_BUCKET }}
          backend_region: ${{ secrets.TF_STATE_REGION }}
          backend_key: ${{ steps.backend-key.outputs.backend_key }}
          backend_endpoint: ${{ secrets.TF_STATE_ENDPOINT }}
          backend_access_key: ${{ secrets.TF_STATE_ACCESS_KEY }}
          backend_secret_key: ${{ secrets.TF_STATE_SECRET_KEY }}

      - name: Terraform fmt
        run: terraform fmt -check

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: tfplan
        env:
          PLAN_FILE: tfplan.binary
        run: |
          set -euo pipefail
          set +e
          # Intentionally keep refresh enabled so plan reflects real cloud/state delta.
          terraform plan -input=false -detailed-exitcode -out="${PLAN_FILE}"
          exit_code=$?
          set -e
          if [ "${exit_code}" -ne 0 ] && [ "${exit_code}" -ne 2 ]; then
            echo "Terraform plan failed with exit code ${exit_code}"
            exit "${exit_code}"
          fi
          terraform show -no-color "${PLAN_FILE}" > tfplan.txt
          echo "plan_exit_code=${exit_code}" >> "$GITHUB_OUTPUT"

      - name: Destroy infrastructure for restart simulation
        if: ${{ env.TERRAFORM_MODE == 'destroy-recreate' }}
        run: |
          set -euo pipefail
          terraform destroy -input=false -auto-approve
          terraform plan -input=false -out=tfplan.binary
          terraform show -no-color tfplan.binary > tfplan.txt

      - name: Terraform apply
        if: ${{ env.TERRAFORM_MODE == 'apply' || env.TERRAFORM_MODE == 'destroy-recreate' }}
        run: terraform apply -input=false -auto-approve tfplan.binary

      - name: Export terraform outputs
        run: terraform output -json > terraform-outputs.json

      - name: Upload terraform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: terraform-${{ github.run_id }}-${{ env.TF_WORKSPACE }}-${{ env.SIMULATION_PROFILE }}
          path: |
            infrastructure/terraform/tfplan.binary
            infrastructure/terraform/tfplan.txt
            infrastructure/terraform/terraform-outputs.json
            infrastructure/terraform/runtime.auto.tfvars
          if-no-files-found: error
          retention-days: 7
