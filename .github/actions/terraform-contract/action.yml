name: terraform-contract
description: Shared Terraform init/environment/secrets contract for CI/CD workflows

inputs:
  working_directory:
    description: Terraform working directory
    required: false
    default: infrastructure/terraform/environments/dev
  environment_name:
    description: Environment directory name (dev/prod)
    required: false
    default: dev
  use_backend:
    description: Whether to initialize configured backend
    required: false
    default: "false"
  require_secrets:
    description: Whether bootstrap secrets are required
    required: false
    default: "false"

  do_token:
    description: DigitalOcean API token
    required: false
    default: ""
  github_token:
    description: GitHub token for managing repository secrets
    required: false
    default: ""
  github_owner:
    description: GitHub owner (user or organization)
    required: false
    default: ""
  github_repo:
    description: GitHub repository name
    required: false
    default: ""
  argocd_server:
    description: Argo CD server endpoint (for workflows)
    required: false
    default: ""
  argocd_auth_token:
    description: Argo CD auth token (for workflows/image updater)
    required: false
    default: ""
  ssh_key_ids:
    description: HCL list literal of DigitalOcean SSH key IDs/fingerprints
    required: false
    default: ""
  do_ssh_host_fingerprint:
    description: SSH host fingerprint in SHA256 format
    required: false
    default: ""

  do_ssh_host:
    description: Deploy host public IP
    required: false
    default: ""
  do_ssh_port:
    description: Deploy host SSH port
    required: false
    default: ""
  do_ssh_user:
    description: Deploy host SSH user
    required: false
    default: ""

  backend_bucket:
    description: Terraform backend bucket name
    required: false
    default: ""
  backend_region:
    description: Terraform backend region
    required: false
    default: ""
  backend_key:
    description: Terraform backend key for current environment
    required: false
    default: ""
  backend_endpoint:
    description: S3-compatible backend endpoint
    required: false
    default: ""
  backend_access_key:
    description: Backend access key
    required: false
    default: ""
  backend_secret_key:
    description: Backend secret key
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Validate Terraform environment format
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        TF_ENVIRONMENT: ${{ inputs.environment_name }}
      run: |
        set -euo pipefail
        if [[ -z "${TF_ENVIRONMENT}" ]]; then
          echo "environment_name cannot be empty"
          exit 1
        fi

        if [[ ! "${TF_ENVIRONMENT}" =~ ^[a-z0-9][a-z0-9_-]{1,62}$ ]]; then
          echo "environment_name '${TF_ENVIRONMENT}' is invalid; use lowercase letters, numbers, '_' or '-' (2-63 chars)."
          exit 1
        fi

    - name: Enforce DigitalOcean backend shape
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        USE_BACKEND: ${{ inputs.use_backend }}
        BACKEND_ENDPOINT: ${{ inputs.backend_endpoint }}
      run: |
        set -euo pipefail
        if [ "${USE_BACKEND}" = "true" ] && [ -n "${BACKEND_ENDPOINT}" ]; then
          if [[ "${BACKEND_ENDPOINT}" != *"digitaloceanspaces.com"* ]]; then
            echo "backend_endpoint must target DigitalOcean Spaces (digitaloceanspaces.com) when use_backend=true"
            exit 1
          fi
        fi

    - name: Verify bootstrap vs post-provision secrets
      if: ${{ inputs.require_secrets == 'true' }}
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        DO_TOKEN: ${{ inputs.do_token }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        GITHUB_OWNER: ${{ inputs.github_owner }}
        GITHUB_REPO: ${{ inputs.github_repo }}
        SSH_KEY_IDS: ${{ inputs.ssh_key_ids }}
        DO_SSH_HOST_FINGERPRINT: ${{ inputs.do_ssh_host_fingerprint }}
        DO_SSH_HOST: ${{ inputs.do_ssh_host }}
        DO_SSH_PORT: ${{ inputs.do_ssh_port }}
        DO_SSH_USER: ${{ inputs.do_ssh_user }}
      run: |
        set -euo pipefail

        missing_bootstrap=()
        [ -n "${DO_TOKEN}" ] || missing_bootstrap+=("TF_VAR_do_token")
        [ -n "${GITHUB_TOKEN}" ] || missing_bootstrap+=("TF_VAR_github_token")
        [ -n "${GITHUB_OWNER}" ] || missing_bootstrap+=("TF_VAR_github_owner")
        [ -n "${GITHUB_REPO}" ] || missing_bootstrap+=("TF_VAR_github_repo")
        [ -n "${SSH_KEY_IDS}" ] || missing_bootstrap+=("TF_VAR_ssh_key_ids")
        [ -n "${DO_SSH_HOST_FINGERPRINT}" ] || missing_bootstrap+=("TF_VAR_do_ssh_host_fingerprint")

        if [ "${#missing_bootstrap[@]}" -gt 0 ]; then
          printf 'Missing bootstrap-required secret(s): %s\n' "${missing_bootstrap[*]}"
          exit 1
        fi

        missing_post=()
        [ -n "${DO_SSH_HOST}" ] || missing_post+=("DO_SSH_HOST")
        [ -n "${DO_SSH_PORT}" ] || missing_post+=("DO_SSH_PORT")
        [ -n "${DO_SSH_USER}" ] || missing_post+=("DO_SSH_USER")

        if [ "${#missing_post[@]}" -gt 0 ]; then
          printf 'Post-provision secret(s) not initialized yet (allowed for clean-slate simulation): %s\n' "${missing_post[*]}" >&2
        fi

    - name: Build runtime tfvars
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        REQUIRE_SECRETS: ${{ inputs.require_secrets }}
        DO_TOKEN: ${{ inputs.do_token }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        GITHUB_OWNER: ${{ inputs.github_owner }}
        GITHUB_REPO: ${{ inputs.github_repo }}
        ARGOCD_SERVER: ${{ inputs.argocd_server }}
        ARGOCD_AUTH_TOKEN: ${{ inputs.argocd_auth_token }}
        SSH_KEY_IDS: ${{ inputs.ssh_key_ids }}
        DO_SSH_HOST_FINGERPRINT: ${{ inputs.do_ssh_host_fingerprint }}
      run: |
        set -euo pipefail
        rm -f terraform.tfvars runtime.auto.tfvars

        if [ "${REQUIRE_SECRETS}" = "true" ]; then
          {
            printf 'require_secrets = true\n'
            printf 'do_token     = "%s"\n' "${DO_TOKEN}"
            printf 'github_token = "%s"\n' "${GITHUB_TOKEN}"
            printf 'github_owner = "%s"\n' "${GITHUB_OWNER}"
            printf 'github_repo  = "%s"\n' "${GITHUB_REPO}"
            if [ -n "${ARGOCD_SERVER}" ]; then
              printf 'argocd_server = "%s"\n' "${ARGOCD_SERVER}"
            fi
            if [ -n "${ARGOCD_AUTH_TOKEN}" ]; then
              printf 'argocd_auth_token = "%s"\n' "${ARGOCD_AUTH_TOKEN}"
            fi
            printf 'ssh_key_ids  = %s\n' "${SSH_KEY_IDS}"
            printf 'do_ssh_host_fingerprint = "%s"\n' "${DO_SSH_HOST_FINGERPRINT}"
          } > runtime.auto.tfvars
        else
          printf 'require_secrets = false\n' > runtime.auto.tfvars
        fi

    - name: Terraform init
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        USE_BACKEND: ${{ inputs.use_backend }}
        BACKEND_BUCKET: ${{ inputs.backend_bucket }}
        BACKEND_REGION: ${{ inputs.backend_region }}
        BACKEND_KEY: ${{ inputs.backend_key }}
        BACKEND_ENDPOINT: ${{ inputs.backend_endpoint }}
        BACKEND_ACCESS_KEY: ${{ inputs.backend_access_key }}
        BACKEND_SECRET_KEY: ${{ inputs.backend_secret_key }}
      run: |
        set -euo pipefail

        if [ "${USE_BACKEND}" = "true" ]; then
          missing_backend=()
          [ -n "${BACKEND_BUCKET}" ] || missing_backend+=("TF_STATE_BUCKET")
          [ -n "${BACKEND_REGION}" ] || missing_backend+=("TF_STATE_REGION")
          [ -n "${BACKEND_KEY}" ] || missing_backend+=("backend_key (derived from TF_STATE_KEY_PREFIX)")
          [ -n "${BACKEND_ENDPOINT}" ] || missing_backend+=("TF_STATE_ENDPOINT")
          [ -n "${BACKEND_ACCESS_KEY}" ] || missing_backend+=("TF_STATE_ACCESS_KEY")
          [ -n "${BACKEND_SECRET_KEY}" ] || missing_backend+=("TF_STATE_SECRET_KEY")

          if [ "${#missing_backend[@]}" -gt 0 ]; then
            printf 'Missing backend config secret(s): %s\n' "${missing_backend[*]}"
            exit 1
          fi

          terraform init -reconfigure -input=false \
            -backend-config="bucket=${BACKEND_BUCKET}" \
            -backend-config="key=${BACKEND_KEY}" \
            -backend-config="region=${BACKEND_REGION}" \
            -backend-config="endpoint=${BACKEND_ENDPOINT}" \
            -backend-config="access_key=${BACKEND_ACCESS_KEY}" \
            -backend-config="secret_key=${BACKEND_SECRET_KEY}" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_requesting_account_id=true" \
            -backend-config="use_path_style=true"
        else
          terraform init -backend=false -input=false
        fi

