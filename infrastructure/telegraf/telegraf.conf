[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  debug = true   # Keep this TRUE to see the "Wrote batch" logs
  quiet = false
  logfile = ""
  hostname = ""
  omit_hostname = false

[[inputs.mqtt_consumer]]
  servers = ["tcp://mqtt-broker:1883"]
  topics = ["fire/monitoring/#"] # Matches your test command exactly
  data_format = "json_v2"

  [[inputs.mqtt_consumer.json_v2]]
    [[inputs.mqtt_consumer.json_v2.object]]
      path = "@this"
      tags = ["h_id", "d_id", "pos"] 
      [inputs.mqtt_consumer.json_v2.object.fields]
        # Use DOT NOTATION to find nested JSON values
        "env.t" = "float" 
        "env.s" = "float"
        "log.st" = "int"
        "loc.0" = "float"
        "loc.1" = "float"

[[processors.rename]]
  [[processors.rename.replace]]
    field = "env_t"
    dest = "temperature"
  [[processors.rename.replace]]
    field = "env_s"
    dest = "smoke_level"
  [[processors.rename.replace]]
    field = "log_st"
    dest = "status_code"
  [[processors.rename.replace]]
    field = "loc_0"
    dest = "lat"
  [[processors.rename.replace]]
    field = "loc_1"
    dest = "lng"

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUX_TOKEN}" # Ensure this matches your .env
  organization = "fire-monitoring" # Must match DOCKER_INFLUXDB_INIT_ORG
  bucket = "sensor-data" # Must match DOCKER_INFLUXDB_INIT_BUCKET