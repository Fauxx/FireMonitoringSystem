apiVersion: 1

# Automatically provision the InfluxDB v2 datasource used by dashboards.
datasources:
  - name: Fire Monitoring InfluxDB
    type: influxdb
    uid: influxdb-fire
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    editable: false
    jsonData:
      version: Flux
      organization: ${INFLUXDB_ORG:-fire-monitoring}
      defaultBucket: ${INFLUXDB_BUCKET:-sensor-data}
      tlsSkipVerify: false
    secureJsonData:
      token: ${INFLUXDB_TOKEN:-influx-token}

