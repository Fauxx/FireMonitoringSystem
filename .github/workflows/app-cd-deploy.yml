name: App CD Deploy (Argo CD Manual Sync)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev

concurrency:
  group: app-cd-deploy-${{ github.ref }}-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment == 'prod' && 'production' || 'development' }}
    env:
      ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
      ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
      ARGOCD_APP_NAME: ${{ inputs.environment == 'prod' && 'fire-monitoring-prod' || 'fire-monitoring-dev' }}
    steps:
      - name: Validate Argo CD secrets
        run: |
          if [ -z "${ARGOCD_SERVER}" ] || [ -z "${ARGOCD_AUTH_TOKEN}" ]; then
            echo "Missing ARGOCD_SERVER or ARGOCD_AUTH_TOKEN in GitHub Environment secrets."
            exit 1
          fi

      - name: Install Argo CD CLI
        run: |
          set -euo pipefail
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/argocd

      - name: Sync Argo CD application
        run: |
          set -euo pipefail
          argocd app sync "${ARGOCD_APP_NAME}" --server "${ARGOCD_SERVER}" --auth-token "${ARGOCD_AUTH_TOKEN}" --grpc-web
          argocd app wait "${ARGOCD_APP_NAME}" --server "${ARGOCD_SERVER}" --auth-token "${ARGOCD_AUTH_TOKEN}" --grpc-web --timeout 300
