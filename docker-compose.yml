networks:
  fire-monitoring-net:
    name: fire-monitoring-net
    driver: bridge

volumes:
  db_data:
  influx_data:
  grafana_data:
  prometheus_data:
  loki_data:

services:
  # --- DATA LAYER ---
  db:
    image: postgres:14-alpine
    container_name: fire-db
    env_file: .env
    ports:
      - "15432:5432"
    volumes:
      # Added 'U' option: tells Podman to recursively chown the volume to the current user
      - db_data:/var/lib/postgresql/data:Z,U
    sysctls:
      - net.ipv4.ping_group_range=0 0
    networks:
      - fire-monitoring-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      retries: 5

  # --- DATABASE MIGRATIONS ---
  flyway:
    image: flyway/flyway:10-alpine
    container_name: fire-flyway
    env_file: .env
    environment:
      FLYWAY_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-fire_monitoring}
      FLYWAY_USER: ${POSTGRES_USER}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD}
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
    volumes:
      - ./infrastructure/sql:/flyway/sql:Z
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fire-monitoring-net
    command: ["-connectRetries=60", "migrate"]
    profiles:
      - ""

  influx:
    image: influxdb:2.7-alpine
    container_name: fire-influx
    env_file: .env
    environment:
      DOCKER_INFLUXDB_INIT_MODE: ${INFLUXDB_INIT_MODE}
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    ports:
      - "18086:8086"
    volumes:
      - influx_data:/var/lib/influxdb2:Z,U
    sysctls:
      - net.ipv4.ping_group_range=0 0
    networks:
      - fire-monitoring-net
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: fire-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - type: bind
        source: ./infrastructure/mqtt/config/mosquitto.conf
        target: /mosquitto/config/mosquitto.conf
        read_only: true
        bind:
          selinux: Z
    networks:
      - fire-monitoring-net

  # --- APPLICATION LAYER ---
  api:
    build: ./api
    container_name: fire-api
    env_file: .env
    ports:
      - "18000:8000"
    volumes:
      - ./api:/usr/src/app:Z
      # Anonymous volume for node_modules prevents host/container conflicts
      - /usr/src/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fire-monitoring-net

  etl-processor:
    build: ./etl-processor
    container_name: fire-etl
    env_file: .env
    depends_on:
      influx:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - fire-monitoring-net

  # --- OBSERVABILITY LAYER ---
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: fire-prometheus
    ports:
      - "19090:9090"
    volumes:
      - prometheus_data:/prometheus:Z,U
      - type: bind
        source: ./infrastructure/prometheus/prometheus.yml
        target: /etc/prometheus/prometheus.yml
        read_only: true
        bind:
          selinux: Z
    networks:
      - fire-monitoring-net

  grafana:
    image: grafana/grafana:latest
    container_name: fire-grafana
    env_file: .env
    ports:
      - "13000:3000"
    volumes:
      - grafana_data:/var/lib/grafana:Z,U
      - type: bind
        source: ./infrastructure/grafana/provisioning
        target: /etc/grafana/provisioning
        read_only: true
        bind:
          selinux: Z
    networks:
      - fire-monitoring-net

  # --- REVERSE PROXY ---
  nginx:
    image: nginx:alpine
    container_name: fire-nginx
    ports:
      - "18080:80"
    volumes:
      - type: bind
        source: ./infrastructure/nginx/conf.d
        target: /etc/nginx/conf.d
        read_only: true
        bind:
          selinux: Z
    networks:
      - fire-monitoring-net

  # --- DASHBOARD ---
  dashboard:
    build: ./dashboard
    container_name: fire-dashboard
    ports:
      - "127.0.0.1:13001:80"
    networks:
      - fire-monitoring-net
