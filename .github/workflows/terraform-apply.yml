name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      run_apply:
        description: "Run terraform apply (if false, run plan only)"
        required: true
        type: boolean
        default: false
      use_backend:
        description: "Initialize configured backend (if false, use local backend)"
        required: true
        type: boolean
        default: false
      terraform_workspace:
        description: "Terraform workspace to use"
        required: true
        type: string
        default: "prod"
      plan_run_id:
        description: "Optional workflow run ID to download a previously approved terraform plan artifact"
        required: false
        type: string
        default: ""
      plan_artifact_name:
        description: "Artifact name from the plan run (for example: terraform-plan-<run_id>)"
        required: false
        type: string
        default: ""

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      actions: read
    concurrency:
      group: terraform-production
      cancel-in-progress: false

    defaults:
      run:
        shell: bash
        working-directory: infrastructure/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Verify required secrets
        env:
          TF_VAR_do_token: ${{ secrets.TF_VAR_do_token }}
          TF_VAR_github_token: ${{ secrets.TF_VAR_github_token }}
          TF_VAR_github_owner: ${{ secrets.TF_VAR_github_owner }}
          TF_VAR_github_repo: ${{ secrets.TF_VAR_github_repo }}
          TF_VAR_ssh_key_ids: ${{ secrets.TF_VAR_ssh_key_ids }}
          TF_VAR_do_ssh_host_fingerprint: ${{ secrets.TF_VAR_do_ssh_host_fingerprint }}
        run: |
          set -euo pipefail
          for v in \
            TF_VAR_do_token \
            TF_VAR_github_token \
            TF_VAR_github_owner \
            TF_VAR_github_repo \
            TF_VAR_ssh_key_ids \
            TF_VAR_do_ssh_host_fingerprint; do
            if [ -z "${!v}" ]; then
              echo "Missing required secret: $v"
              exit 1
            fi
          done

      - name: Build runtime tfvars
        env:
          TF_VAR_do_token: ${{ secrets.TF_VAR_do_token }}
          TF_VAR_github_token: ${{ secrets.TF_VAR_github_token }}
          TF_VAR_github_owner: ${{ secrets.TF_VAR_github_owner }}
          TF_VAR_github_repo: ${{ secrets.TF_VAR_github_repo }}
          TF_VAR_ssh_key_ids: ${{ secrets.TF_VAR_ssh_key_ids }}
          TF_VAR_do_ssh_host_fingerprint: ${{ secrets.TF_VAR_do_ssh_host_fingerprint }}
        run: |
          set -euo pipefail
          rm -f terraform.tfvars
          cat > runtime.auto.tfvars <<EOF
          require_secrets = true
          do_token     = "${TF_VAR_do_token}"
          github_token = "${TF_VAR_github_token}"
          github_owner = "${TF_VAR_github_owner}"
          github_repo  = "${TF_VAR_github_repo}"
          ssh_key_ids  = ${TF_VAR_ssh_key_ids}
          do_ssh_host_fingerprint = "${TF_VAR_do_ssh_host_fingerprint}"
          EOF

      - name: Terraform init (no backend)
        if: ${{ !inputs.use_backend }}
        run: terraform init -backend=false -input=false

      - name: Terraform init (backend)
        if: ${{ inputs.use_backend }}
        run: terraform init -input=false

      - name: Select terraform workspace
        env:
          TF_WORKSPACE: ${{ inputs.terraform_workspace }}
        run: |
          set -euo pipefail
          terraform workspace select "${TF_WORKSPACE}" || terraform workspace new "${TF_WORKSPACE}"

      - name: Terraform validate
        run: terraform validate

      - name: Validate artifact inputs
        if: ${{ inputs.plan_run_id != '' || inputs.plan_artifact_name != '' }}
        env:
          PLAN_RUN_ID: ${{ inputs.plan_run_id }}
          PLAN_ARTIFACT_NAME: ${{ inputs.plan_artifact_name }}
        run: |
          set -euo pipefail
          if [ -z "${PLAN_RUN_ID}" ]; then
            echo "Error: plan_run_id is required when plan_artifact_name is provided."
            exit 1
          elif [ -z "${PLAN_ARTIFACT_NAME}" ]; then
            echo "Error: plan_artifact_name is required when plan_run_id is provided."
            exit 1
          fi

      - name: Download approved terraform plan artifact
        if: ${{ inputs.plan_run_id != '' && inputs.plan_artifact_name != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.plan_artifact_name }}
          path: infrastructure/terraform
          run-id: ${{ inputs.plan_run_id }}
          github-token: ${{ github.token }}

      - name: Terraform plan
        if: ${{ inputs.plan_run_id == '' || inputs.plan_artifact_name == '' }}
        run: terraform plan -input=false -lock-timeout=5m -out=tfplan.binary

      - name: Verify plan file exists
        run: |
          set -euo pipefail
          test -f tfplan.binary

      - name: Terraform apply
        if: ${{ inputs.run_apply }}
        run: terraform apply -auto-approve -input=false -lock-timeout=5m tfplan.binary

      - name: Summarize terraform apply run
        if: ${{ always() }}
        env:
          BACKEND_MODE: ${{ inputs.use_backend && 'backend' || 'local-no-backend' }}
          PLAN_SOURCE: ${{ inputs.plan_run_id != '' && inputs.plan_artifact_name != '' && 'approved-artifact' || 'local-plan' }}
        run: |
          {
            echo "## Terraform Apply Summary"
            echo
            echo "- Backend mode: ${BACKEND_MODE}"
            echo "- Workspace: ${{ inputs.terraform_workspace }}"
            echo "- Run apply: ${{ inputs.run_apply }}"
            echo "- Plan source: ${PLAN_SOURCE}"
            if [ "${PLAN_SOURCE}" = "approved-artifact" ]; then
              echo "- Plan run ID: ${{ inputs.plan_run_id }}"
              echo "- Plan artifact: ${{ inputs.plan_artifact_name }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
