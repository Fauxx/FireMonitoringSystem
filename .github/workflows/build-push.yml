name: Build and Push

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. This solves the "Uppercase" error from your screenshot
      - name: Set Repository Name to Lowercase
        id: prep
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
          echo "IMAGE_SHA_TAG=sha-${GITHUB_SHA}" >> $GITHUB_ENV
          echo "REF_SLUG=${GITHUB_REF_NAME//\//-}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. Build the API (Matches your /api folder)
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/api:latest
            ghcr.io/${{ env.REPO_LOWER }}/api:${{ env.IMAGE_SHA_TAG }}
            ghcr.io/${{ env.REPO_LOWER }}/api:${{ env.REF_SLUG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # 3. Build the Dashboard (Matches your /dashboard folder)
      - name: Build and push Dashboard image
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/dashboard:latest
            ghcr.io/${{ env.REPO_LOWER }}/dashboard:${{ env.IMAGE_SHA_TAG }}
            ghcr.io/${{ env.REPO_LOWER }}/dashboard:${{ env.REF_SLUG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # 4. Build the ETL (Matches your /etl-processor folder)
      - name: Build and push ETL image
        uses: docker/build-push-action@v6
        with:
          context: ./etl-processor
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/etl:latest
            ghcr.io/${{ env.REPO_LOWER }}/etl:${{ env.IMAGE_SHA_TAG }}
            ghcr.io/${{ env.REPO_LOWER }}/etl:${{ env.REF_SLUG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
