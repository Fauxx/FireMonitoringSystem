# Placeholder Telegraf configuration for the fire-monitoring stack
[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = "0s"
  debug = false
  quiet = false

[[outputs.influxdb_v2]]
  ## Update with real InfluxDB endpoint/token/org/bucket values
  urls = ["http://influxdb:8086"]
  token = "SET_INFLUX_TOKEN"
  organization = "fire-monitoring"
  bucket = "sensor-data"

[[inputs.mqtt_consumer]]
  servers = ["tcp://mqtt-broker:1883"]
  topics = ["sensors/#"]
  qos = 0
  connection_timeout = "30s"
  data_format = "json"

[[inputs.postgresql]]
  address = "host=postgres user=fireuser password=changeme dbname=fire_monitoring sslmode=disable"
  databases = ["fire_monitoring"]
