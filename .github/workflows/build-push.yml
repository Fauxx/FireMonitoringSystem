name: Build and Push Images

on:
  push:
    # Trigger on EVERY branch push to ensure code changes don't break the build
    branches: [ "**" ]
    paths:
      - 'api/**'
      - 'dashboard/**'
      - 'etl-processor/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Environment Variables
        id: prep
        run: |
          set -euo pipefail
          # Lowercase Repo Name
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
          
          # Logic: If main branch, tag is 'latest'. Otherwise, tag is branch name (e.g., 'dev-zet')
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "DOCKER_TAG=latest" >> $GITHUB_ENV
          else
            SAFE_TAG="$(echo "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+//; s/-+$//')"
            if [ -z "${SAFE_TAG}" ]; then
              SAFE_TAG="dev"
            fi
            echo "DOCKER_TAG=${SAFE_TAG}" >> $GITHUB_ENV
          fi
          
          # Always keep the SHA tag for specific deployments/rollbacks
          echo "SHA_TAG=sha-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- API Build ---
      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/api:${{ env.DOCKER_TAG }}
            ghcr.io/${{ env.REPO_LOWER }}/api:${{ env.SHA_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Dashboard Build ---
      - name: Build and push Dashboard
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/dashboard:${{ env.DOCKER_TAG }}
            ghcr.io/${{ env.REPO_LOWER }}/dashboard:${{ env.SHA_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- ETL Processor Build ---
      - name: Build and push ETL
        uses: docker/build-push-action@v6
        with:
          context: ./etl-processor
          file: ./etl-processor/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/etl:${{ env.DOCKER_TAG }}
            ghcr.io/${{ env.REPO_LOWER }}/etl:${{ env.SHA_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max