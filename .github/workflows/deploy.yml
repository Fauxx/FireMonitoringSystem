name: Deploy to Droplet

on:
  workflow_run:
    workflows: ["Build and Push Images"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g., latest, dev-zet, or sha-<commit>)"
        required: true
        default: "latest"
      allow_fallback_to_latest:
        description: "If true, fallback to fallback_tag when requested image tag is missing"
        required: true
        type: boolean
        default: false
      fallback_tag:
        description: "Fallback image tag used only when allow_fallback_to_latest=true"
        required: true
        default: "latest"
      healthcheck_url:
        description: "Optional post-deploy URL check (use an API-backed endpoint, not /health)"
        required: false
        default: ""

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      contents: read
      packages: read
    env:
      REQUESTED_IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || format('sha-{0}', github.event.workflow_run.head_sha) }}
      IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || format('sha-{0}', github.event.workflow_run.head_sha) }}
      FALLBACK_ALLOWED: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_fallback_to_latest || false }}
      FALLBACK_TAG_VALUE: ${{ github.event_name == 'workflow_dispatch' && inputs.fallback_tag || 'latest' }}
      HEALTHCHECK_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.healthcheck_url || '' }}
      UPSTREAM_RUN_URL: ${{ github.event_name == 'workflow_run' && format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.event.workflow_run.id) || 'manual-dispatch' }}
      DEPLOY_BRANCH: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
      GHCR_OWNER: ${{ github.repository_owner }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
      POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
      PGSSLMODE: ${{ secrets.PGSSLMODE }}
      INFLUXDB_INIT_MODE: ${{ secrets.INFLUXDB_INIT_MODE }}
      INFLUXDB_USERNAME: ${{ secrets.INFLUXDB_USERNAME }}
      INFLUXDB_PASSWORD: ${{ secrets.INFLUXDB_PASSWORD }}
      INFLUXDB_ORG: ${{ secrets.INFLUXDB_ORG }}
      INFLUXDB_BUCKET: ${{ secrets.INFLUXDB_BUCKET }}
      INFLUXDB_TOKEN: ${{ secrets.INFLUXDB_TOKEN }}
      INFLUXDB_URL: ${{ secrets.INFLUXDB_URL }}
      INFLUXDB_CLI_CONFIG_NAME: ${{ vars.INFLUXDB_CLI_CONFIG_NAME }}
      MQTT_BROKER_HOST: ${{ vars.MQTT_BROKER_HOST }}
      MQTT_BROKER_PORT: ${{ vars.MQTT_BROKER_PORT }}
      ETL_SYNC_INTERVAL: ${{ vars.ETL_SYNC_INTERVAL }}
      AGG_WINDOW_MINUTES: ${{ vars.AGG_WINDOW_MINUTES }}
      THRESHOLD_SMOKE_ORANGE: ${{ vars.THRESHOLD_SMOKE_ORANGE }}
      THRESHOLD_SMOKE_RED: ${{ vars.THRESHOLD_SMOKE_RED }}
      THRESHOLD_TEMP_ORANGE: ${{ vars.THRESHOLD_TEMP_ORANGE }}
      THRESHOLD_TEMP_RED: ${{ vars.THRESHOLD_TEMP_RED }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      REPO_ACCESS_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy credentials and fallback inputs
        run: |
          set -euo pipefail
          missing=()
          for key in GHCR_USERNAME GHCR_TOKEN REPO_ACCESS_TOKEN; do
            if [ -z "${!key:-}" ]; then
              missing+=("${key}")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Error: Missing required deploy credentials/secrets."
            printf ' - %s\n' "${missing[@]}"
            echo "Action: set repository/environment secrets for all missing keys before deploy."
            exit 1
          fi

          if [ "${FALLBACK_ALLOWED}" != "true" ] && [ "${FALLBACK_ALLOWED}" != "false" ]; then
            echo "Error: FALLBACK_ALLOWED must be 'true' or 'false'. Got '${FALLBACK_ALLOWED}'."
            exit 1
          fi

          if [ "${FALLBACK_ALLOWED}" = "true" ] && [ -z "${FALLBACK_TAG_VALUE}" ]; then
            echo "Error: FALLBACK_TAG_VALUE is required when FALLBACK_ALLOWED=true."
            exit 1
          fi

          echo "Preflight inputs: requested_tag='${REQUESTED_IMAGE_TAG}', fallback_allowed='${FALLBACK_ALLOWED}', fallback_tag='${FALLBACK_TAG_VALUE}', upstream='${UPSTREAM_RUN_URL}'"

      # Verify both required deploy images exist before SSH/deploy, with retries and optional fallback.
      - name: Resolve deploy image tag from GHCR
        run: |
          set -euo pipefail
          OWNER_LOWER="${GHCR_OWNER,,}"
          REQUESTED_TAG="${REQUESTED_IMAGE_TAG}"
          MAX_ATTEMPTS=12
          INITIAL_SLEEP_SECONDS=10
          MAX_SLEEP_SECONDS=60

          echo "Authenticating to GHCR for image availability checks..."
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

          required_refs_for_tag() {
            local tag="$1"
            printf '%s\n' \
              "ghcr.io/${OWNER_LOWER}/api:${tag}" \
              "ghcr.io/${OWNER_LOWER}/etl-processor:${tag}"
          }

          check_tag() {
            local tag="$1"
            local -n out_missing="$2"
            out_missing=()

            while IFS= read -r ref; do
              if ! docker manifest inspect "${ref}" > /dev/null 2>&1; then
                out_missing+=("${ref}")
              fi
            done < <(required_refs_for_tag "${tag}")

            [ "${#out_missing[@]}" -eq 0 ]
          }

          wait_for_tag() {
            local tag="$1"
            local -n out_last_missing="$2"
            out_last_missing=()
            local sleep_seconds="${INITIAL_SLEEP_SECONDS}"

            for attempt in $(seq 1 "${MAX_ATTEMPTS}"); do
              local missing_now=()
              if check_tag "${tag}" missing_now; then
                echo "Image refs available for tag '${tag}' on attempt ${attempt}/${MAX_ATTEMPTS}."
                return 0
              fi

              out_last_missing=("${missing_now[@]}")
              echo "Attempt ${attempt}/${MAX_ATTEMPTS}: Missing image refs for tag '${tag}':"
              printf ' - %s\n' "${out_last_missing[@]}"

              if [ "${attempt}" -lt "${MAX_ATTEMPTS}" ]; then
                echo "Retrying in ${sleep_seconds}s..."
                sleep "${sleep_seconds}"
                sleep_seconds=$((sleep_seconds * 2))
                if [ "${sleep_seconds}" -gt "${MAX_SLEEP_SECONDS}" ]; then
                  sleep_seconds="${MAX_SLEEP_SECONDS}"
                fi
              fi
            done

            return 1
          }

          requested_missing_refs=()
          fallback_missing_refs=()

          if wait_for_tag "${REQUESTED_TAG}" requested_missing_refs; then
            echo "IMAGE_TAG=${REQUESTED_TAG}" >> "$GITHUB_ENV"
            echo "Resolved deploy IMAGE_TAG='${REQUESTED_TAG}' (requested tag available)."
            exit 0
          fi

          if [ "${FALLBACK_ALLOWED}" = "true" ] && [ "${REQUESTED_TAG}" != "${FALLBACK_TAG_VALUE}" ]; then
            echo "Requested tag '${REQUESTED_TAG}' unavailable after retries. Trying fallback tag '${FALLBACK_TAG_VALUE}'."
            if wait_for_tag "${FALLBACK_TAG_VALUE}" fallback_missing_refs; then
              echo "IMAGE_TAG=${FALLBACK_TAG_VALUE}" >> "$GITHUB_ENV"
              echo "Resolved deploy IMAGE_TAG='${FALLBACK_TAG_VALUE}' (fallback tag available)."
              exit 0
            fi
          fi

          echo "::error title=GHCR image lookup failed::Unable to resolve deploy image tag after retries."
          echo "Requested tag: '${REQUESTED_TAG}'"
          echo "Fallback allowed: '${FALLBACK_ALLOWED}'"
          echo "Fallback tag: '${FALLBACK_TAG_VALUE}'"
          echo "Upstream run: ${UPSTREAM_RUN_URL}"

          if [ "${#requested_missing_refs[@]}" -gt 0 ]; then
            echo "Missing refs for requested tag '${REQUESTED_TAG}':"
            printf ' - %s\n' "${requested_missing_refs[@]}"
          fi

          if [ "${#fallback_missing_refs[@]}" -gt 0 ]; then
            echo "Missing refs for fallback tag '${FALLBACK_TAG_VALUE}':"
            printf ' - %s\n' "${fallback_missing_refs[@]}"
          fi

          echo "Action: wait for GHCR publish/propagation or rerun deploy with a known-good tag/fallback configuration."
          exit 1

      - name: SSH host key preflight
        run: |
          set -euo pipefail
          HOST="${{ secrets.DO_SSH_HOST }}"
          PORT="${{ secrets.DO_SSH_PORT || '22' }}"
          # Use ssh-keyscan to update known_hosts so appleboy doesn't trip on the new IP fingerprint
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" "$HOST" >> ~/.ssh/known_hosts

      - name: SSH connectivity preflight
        env:
          HOST: ${{ secrets.DO_SSH_HOST }}
          PORT: ${{ secrets.DO_SSH_PORT || '22' }}
        run: |
          set -euo pipefail
          if [ -z "${HOST}" ]; then
            echo "Error: DO_SSH_HOST is empty."
            exit 1
          fi

          echo "Resolving ${HOST}..."
          getent hosts "${HOST}" || true

          echo "Checking TCP connectivity to ${HOST}:${PORT}..."
          if ! nc -zvw8 "${HOST}" "${PORT}"; then
            echo "::error title=SSH connectivity preflight failed::Unable to reach ${HOST}:${PORT} from GitHub runner."
            echo "Likely causes:"
            echo " - DO_SSH_HOST is stale after droplet reprovision"
            echo " - Firewall/security groups block runner source IPs on port ${PORT}"
            echo " - SSH service is down or listening on a different port"
            echo "Actions:"
            echo " - Verify DO_SSH_HOST and DO_SSH_PORT secrets"
            echo " - Verify droplet firewall inbound rules for TCP ${PORT}"
            echo " - Consider self-hosted runner/bastion if runner egress is blocked"
            exit 1
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_SSH_HOST }}
          port: ${{ secrets.DO_SSH_PORT || '22' }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          # We automated this in Terraform! Ensure secrets.DO_SSH_FINGERPRINT is the HOST key fingerprint
          fingerprint: ${{ secrets.DO_SSH_FINGERPRINT }}
          script_stop: true
          envs: IMAGE_TAG,HEALTHCHECK_URL,DEPLOY_BRANCH,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,POSTGRES_HOST,POSTGRES_PORT,PGSSLMODE,INFLUXDB_INIT_MODE,INFLUXDB_USERNAME,INFLUXDB_PASSWORD,INFLUXDB_ORG,INFLUXDB_BUCKET,INFLUXDB_TOKEN,INFLUXDB_URL,INFLUXDB_CLI_CONFIG_NAME,MQTT_BROKER_HOST,MQTT_BROKER_PORT,ETL_SYNC_INTERVAL,AGG_WINDOW_MINUTES,THRESHOLD_SMOKE_ORANGE,THRESHOLD_SMOKE_RED,THRESHOLD_TEMP_ORANGE,THRESHOLD_TEMP_RED,GITHUB_REPOSITORY,GHCR_USERNAME,GHCR_TOKEN,REPO_ACCESS_TOKEN
          script: |
            set -euo pipefail
            APP_DIR="/opt/fire-monitoring"
            IMAGE_REGISTRY="ghcr.io/$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
            GHCR_USER="${GHCR_USERNAME:-${GITHUB_ACTOR:-}}"

            sudo mkdir -p "${APP_DIR}"
            sudo chown -R $USER:$USER "${APP_DIR}"

            if [ ! -d "${APP_DIR}/.git" ]; then
              git clone "https://x-access-token:${REPO_ACCESS_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "${APP_DIR}"
            fi

            cd "${APP_DIR}"
            git remote set-url origin "https://x-access-token:${REPO_ACCESS_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            
            # Use the branch that triggered the workflow (main or dev-zet)
            git fetch origin "${DEPLOY_BRANCH}"
            git checkout "${DEPLOY_BRANCH}"
            git reset --hard "origin/${DEPLOY_BRANCH}"

            # Create production env
            cat > .env.prod <<EOF
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            POSTGRES_DB=${POSTGRES_DB}
            DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB}
            PGSSLMODE=${PGSSLMODE}
            INFLUXDB_INIT_MODE=${INFLUXDB_INIT_MODE}
            INFLUXDB_USERNAME=${INFLUXDB_USERNAME}
            INFLUXDB_PASSWORD=${INFLUXDB_PASSWORD}
            INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
            INFLUXDB_ORG=${INFLUXDB_ORG}
            INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
            INFLUXDB_URL=${INFLUXDB_URL}
            IMAGE_REGISTRY=${IMAGE_REGISTRY}
            IMAGE_TAG=${IMAGE_TAG}
            EOF
            cp .env.prod .env

            if [ -z "${GHCR_USER}" ] || [ -z "${GHCR_TOKEN}" ]; then
              echo "Error: GHCR credentials are missing. Set GHCR_USERNAME and GHCR_TOKEN."
              exit 1
            fi

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
            
            # Pull and Restart
            docker compose -f docker-compose.yml -f docker-compose-prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose-prod.yml up -d --remove-orphans --force-recreate

            # Verify API health inside the api container with retries to handle slow startup.
            api_ok=0
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.yml -f docker-compose-prod.yml exec -T api \
                node -e "require('http').get('http://localhost:8000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"; then
                api_ok=1
                echo "Internal API healthcheck passed."
                break
              fi
              sleep 3
            done

            if [ "${api_ok}" -ne 1 ]; then
              echo "Error: API healthcheck failed inside api container."
              docker compose -f docker-compose.yml -f docker-compose-prod.yml ps
              docker compose -f docker-compose.yml -f docker-compose-prod.yml logs --tail=80 api nginx || true
              exit 1
            fi

            if [ -n "${HEALTHCHECK_URL:-}" ]; then
              if [ "${HEALTHCHECK_URL}" = "http://localhost/health" ] || [ "${HEALTHCHECK_URL}" = "https://localhost/health" ]; then
                echo "Error: HEALTHCHECK_URL points to nginx /health which is not app-level. Use an API-backed URL or leave it empty."
                exit 1
              fi

              echo "Running healthcheck against ${HEALTHCHECK_URL}"
              for i in $(seq 1 30); do
                if curl -fsS --max-time 5 "${HEALTHCHECK_URL}" > /dev/null; then
                  echo "Healthcheck passed."
                  exit 0
                fi
                sleep 5
              done

              echo "Error: Healthcheck failed after retries."
              exit 1
            fi

      - name: Deploy failure diagnostics
        if: ${{ failure() }}
        env:
          HOST: ${{ secrets.DO_SSH_HOST }}
          PORT: ${{ secrets.DO_SSH_PORT || '22' }}
        run: |
          set +e
          echo "=== deploy diagnostics ==="
          echo "Host: ${HOST}"
          echo "Port: ${PORT}"
          echo "--- DNS lookup ---"
          getent hosts "${HOST}" || true
          echo "--- route ---"
          ip route || true
          echo "--- TCP check ---"
          nc -zvw8 "${HOST}" "${PORT}" || true

      - name: Summarize deploy run
        if: ${{ always() }}
        run: |
          {
            echo "## Deploy Summary"
            echo
            echo "- Requested image tag: ${REQUESTED_IMAGE_TAG}"
            echo "- Resolved image tag: ${IMAGE_TAG}"
            echo "- Branch: ${DEPLOY_BRANCH}"
            echo "- Upstream run: ${UPSTREAM_RUN_URL}"
            echo "- Fallback allowed: ${FALLBACK_ALLOWED}"
            echo "- Fallback tag: ${FALLBACK_TAG_VALUE}"
          } >> "$GITHUB_STEP_SUMMARY"
