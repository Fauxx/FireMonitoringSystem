name: App CD Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "api/**"
      - "dashboard/**"
      - "etl-processor/**"
      - "docker-compose.yml"
      - "docker-compose-prod.yml"
      - "infrastructure/**"
      - ".github/workflows/app-cd-deploy.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev
      image_tag:
        description: "Override image tag (defaults to SHA/tag)"
        required: false
        type: string

concurrency:
  group: app-cd-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-dev:
    if: github.actor != 'github-actions[bot]' && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: development
    env:
      DEPLOY_ENV: dev
    steps:
      - name: Deploy to dev host
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_SSH_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DO_SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            IMAGE_REGISTRY="ghcr.io/${GITHUB_REPOSITORY,,}"
            IMAGE_TAG="${{ inputs.image_tag }}"
            if [ -z "${IMAGE_TAG}" ]; then
              IMAGE_TAG="sha-${GITHUB_SHA::12}"
            fi
            cd /opt/fire-monitoring
            touch .env
            grep -q '^IMAGE_REGISTRY=' .env && sed -i "s#^IMAGE_REGISTRY=.*#IMAGE_REGISTRY=${IMAGE_REGISTRY}#" .env || echo "IMAGE_REGISTRY=${IMAGE_REGISTRY}" >> .env
            grep -q '^IMAGE_TAG=' .env && sed -i "s#^IMAGE_TAG=.*#IMAGE_TAG=${IMAGE_TAG}#" .env || echo "IMAGE_TAG=${IMAGE_TAG}" >> .env
            docker login ghcr.io -u "${{ secrets.GHCR_DEPLOY_USERNAME }}" -p "${{ secrets.GHCR_DEPLOY_TOKEN }}"
            docker compose -f docker-compose.yml -f docker-compose-prod.yml pull api etl-processor dashboard
            docker compose -f docker-compose.yml -f docker-compose-prod.yml up -d api etl-processor dashboard nginx

  deploy-prod:
    if: github.actor != 'github-actions[bot]' && ((github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - name: Deploy to prod host
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_SSH_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DO_SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            IMAGE_REGISTRY="ghcr.io/${GITHUB_REPOSITORY,,}"
            IMAGE_TAG="${{ inputs.image_tag }}"
            if [ -z "${IMAGE_TAG}" ]; then
              if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
                IMAGE_TAG="${GITHUB_REF_NAME}"
              else
                IMAGE_TAG="sha-${GITHUB_SHA::12}"
              fi
            fi
            cd /opt/fire-monitoring
            touch .env
            grep -q '^IMAGE_REGISTRY=' .env && sed -i "s#^IMAGE_REGISTRY=.*#IMAGE_REGISTRY=${IMAGE_REGISTRY}#" .env || echo "IMAGE_REGISTRY=${IMAGE_REGISTRY}" >> .env
            grep -q '^IMAGE_TAG=' .env && sed -i "s#^IMAGE_TAG=.*#IMAGE_TAG=${IMAGE_TAG}#" .env || echo "IMAGE_TAG=${IMAGE_TAG}" >> .env
            docker login ghcr.io -u "${{ secrets.GHCR_DEPLOY_USERNAME }}" -p "${{ secrets.GHCR_DEPLOY_TOKEN }}"
            docker compose -f docker-compose.yml -f docker-compose-prod.yml pull api etl-processor dashboard
            docker compose -f docker-compose.yml -f docker-compose-prod.yml up -d api etl-processor dashboard nginx

